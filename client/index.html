<!doctype html>
<html lang="pt-BR">
  <head>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#092846" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="CrewCheck Premium: análise de CrewRosterReport PDF com dashboard desktop e mobile." />
    <title>CrewCheck Premium</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
    <script>
      (function () {
        try {
          var key = 'crewcheck-cache-reset-10-8-1';
          if (window.localStorage && window.localStorage.getItem(key) !== 'done') {
            window.localStorage.setItem(key, 'done');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (registrations) {
                return Promise.all(registrations.map(function (registration) { return registration.unregister(); }));
              }).catch(function () {});
            }
            if ('caches' in window) {
              caches.keys().then(function (names) {
                return Promise.all(names.filter(function (name) {
                  return /crewcheck|workbox|vite/i.test(name);
                }).map(function (name) { return caches.delete(name); }));
              }).catch(function () {});
            }
          }
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
