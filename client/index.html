    <style>
      .vrBootFallback{min-height:100dvh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#eef7f5,#f9fcfb);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#123a3a}.vrBootCard{width:min(430px,100%);padding:28px;border:1px solid rgba(16,104,99,.14);border-radius:28px;background:rgba(255,255,255,.94);box-shadow:0 24px 70px rgba(4,52,58,.12);text-align:center}.vrBootLogo{width:74px;height:74px;object-fit:contain;margin-bottom:14px}.vrBootCard h1{margin:0 0 8px;font-size:1.45rem}.vrBootCard p{margin:0;color:#587270;line-height:1.5}.vrBootSpinner{width:38px;height:38px;margin:22px auto 16px;border:3px solid #d7e8e5;border-top-color:#0a8278;border-radius:50%;animation:vrBootSpin .8s linear infinite}.vrBootActions{display:none;margin-top:18px;gap:10px;justify-content:center}.vrBootFallback[data-state="delayed"] .vrBootActions,.vrBootFallback[data-state="error"] .vrBootActions{display:flex}.vrBootFallback[data-state="error"] .vrBootSpinner{animation:none;border-color:#e9c5c9;border-top-color:#bf2d3f}.vrBootButton{min-height:46px;padding:0 18px;border:0;border-radius:14px;background:#08796f;color:#fff;font-weight:800}.vrBootHint{display:block;margin-top:12px;font-size:.78rem;color:#78908e}@keyframes vrBootSpin{to{transform:rotate(360deg)}}
    </style>
    <title>Vitória Régia One</title>
  </head>
  <body>
    <div id="root">
      <div id="vr-boot-fallback" class="vrBootFallback" role="status" aria-live="polite">
        <section class="vrBootCard">
          <img src="/logo-vitoria-regia.svg" class="vrBootLogo" alt="Vitória Régia" />
          <h1>Vitória Régia One</h1>
          <p id="vr-boot-message">Abrindo o sistema com segurança…</p>
          <div class="vrBootSpinner" aria-hidden="true"></div>
          <div class="vrBootActions"><button class="vrBootButton" type="button" onclick="window.__vrRecoverBoot?.()">Recarregar sistema</button></div>
          <small class="vrBootHint">A tela de login aparecerá automaticamente.</small>
        </section>
      </div>
    </div>
    <script>
      (()=>{
        const fallback=document.getElementById('vr-boot-fallback');
        const message=document.getElementById('vr-boot-message');
        const stillWaiting=()=>Boolean(fallback&&fallback.isConnected&&document.getElementById('root')?.contains(fallback));
        const show=(text,state='error')=>{if(!stillWaiting())return;fallback.dataset.state=state;if(message)message.textContent=text;};
        window.__vrRecoverBoot=async()=>{
          try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(reg=>reg.unregister()));}}catch{}
          try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(key=>caches.delete(key)));}}catch{}
          const url=new URL(location.href);url.searchParams.set('vr_recover',Date.now().toString());location.replace(url.toString());
        };
        window.setTimeout(()=>show('A inicialização está demorando mais que o normal. Toque em “Recarregar sistema” para renovar os arquivos do aplicativo.','delayed'),10000);
        window.addEventListener('error',()=>show('Um componente não conseguiu iniciar. Recarregue para buscar a versão corrigida.','error'));
        window.addEventListener('unhandledrejection',()=>show('Não foi possível concluir a inicialização. Recarregue para tentar novamente.','error'));
      })();
    </script>
