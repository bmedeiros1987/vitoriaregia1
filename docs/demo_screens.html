<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Demo Vitória Régia Pro</title><link rel="stylesheet" href="../client/src/styles.css"><style>svg{display:none}.demoIcon{font-size:22px}.mobileShot{max-width:410px;margin:auto;border:10px solid #111;border-radius:32px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.28)}.mobileShot .content{padding:74px 14px 18px}.demoOnly{display:block}</style></head><body><div id="root"></div><script>
const qs=new URLSearchParams(location.search);const screen=qs.get('screen')||'dashboard';if(qs.get('dark')) document.body.dataset.appearance='dark';document.documentElement.style.setProperty('--accent','#126b5f');
const nav=['Início','Moradores','Acessos','Portaria','Encomendas','Notas fiscais','Emergência','Configurações'];
function sidebar(){return `<aside><div class="sideTop"><b>♧</b><div><strong>Condomínio Vitória Régia</strong><small>síndico</small></div><button class="sideClose">✕</button></div><nav>${nav.map(n=>`<button class="${(screen==='dashboard'&&n==='Início')||(screen==='config'&&n==='Configurações')?'on':''}"><span class="demoIcon">•</span><span>${n}</span></button>`).join('')}</nav><div class="sideBottom"><button><span>Compactar</span></button><button><span>Fechar menu</span></button></div></aside>`}
function topbarDemo(){return `<header class="topbar"><div><span class="eyebrow">♛ Sistema vendável</span><h1>Condomínio Vitória Régia</h1><p>Atalhos rápidos, OCR, notificações e apps por perfil.</p></div><div class="topActions"><button>🔔 Notificações</button><div class="profile"><span><b>Síndico</b><small>admin</small></span></div></div></header>`}
function dashboard(){return `<section class="hero"><div><span class="eyebrow">✨ Pronto para vender</span><h2>Central Vitória Régia Pro</h2><p>Dashboard estilo aplicativo, operação mobile, OCR em cadastros e notificações automáticas.</p></div><div class="heroStats"><b>128</b><span>moradores</span><b>9</b><span>alertas</span></div></section><div class="metricStrip"><article class="metric"><span>👥</span><span>Moradores</span><b>128</b></article><article class="metric"><span>📦</span><span>Encomendas</span><b>42</b></article><article class="metric"><span>🧾</span><span>Notas</span><b>16</b></article><article class="metric"><span>🚨</span><span>Ocorrências</span><b>2</b></article></div><div class="cards"><article class="rose"><div>📦</div><h3>Encomendas OCR</h3><p>Cadastrar etiqueta com câmera e notificar morador.</p><span>12</span></article><article class="blue"><div>🚪</div><h3>Portaria</h3><p>Visitantes e rotina de entrada.</p><span>5</span></article><article class="gold"><div>🧾</div><h3>Notas fiscais</h3><p>OCR para síndico cadastrar documentos.</p><span>16</span></article><article class="red"><div>🚨</div><h3>Emergência</h3><p>Tipos configuráveis e telefone do elevador.</p><span>2</span></article><article class="violet"><div>🔑</div><h3>Acessos</h3><p>Permissões por usuário e morador.</p><span>23</span></article><article class="green"><div>📱</div><h3>Apps Android</h3><p>Portaria, síndico e morador.</p><span>3</span></article></div>`}
function packages(){return `<section class="panel"><div class="panelHead"><div><span class="demoIcon">📦</span><span><h2>Encomendas</h2><p>Use câmera/OCR para ler etiquetas, vincular ao morador e notificar automaticamente.</p></span></div></div><div class="ocrBox"><div><h3>🔎 OCR da etiqueta</h3><p>No celular, toque em câmera, fotografe a etiqueta e revise os campos antes de salvar.</p></div><label class="uploadBtn">📷 Ler etiqueta</label></div><form class="formGrid"><input value="BR123456789BR"><input value="Maria Oliveira"><input value="101"><input value="Correios"><button>+ Cadastrar e notificar</button></form><table><tbody><tr><td><b>BR123456789BR</b><small>Maria Oliveira · Unidade 101 · vinculada automaticamente</small></td><td><span class="status">pendente</span><small>enviada</small></td><td><button>✓ Entregar</button></td></tr></tbody></table></section>`}
function invoices(){return `<section class="panel"><div class="panelHead"><div><span>🧾</span><span><h2>Notas fiscais</h2><p>OCR para cadastro administrativo do síndico.</p></span></div></div><div class="ocrBox"><div><h3>☁ OCR de nota fiscal</h3><p>Fotografe a NF ou DANFE. O sistema extrai fornecedor, valor, número e chave.</p></div><label class="uploadBtn">📷 Ler nota fiscal</label></div><form class="formGrid"><input value="Manutenção Elevadores LTDA"><input value="000123"><input value="3519 0000 0000"><input value="850.00"><button>Salvar NF</button></form><table><tbody><tr><td><b>Manutenção Elevadores LTDA</b><small>NF 000123 · chave informada</small></td><td>R$ 850,00</td><td><span class="status ok">registrada</span></td></tr></tbody></table></section>`}
function emergency(){return `<section class="panel"><div class="panelHead"><div><span>🚨</span><span><h2>Emergência</h2><p>Escolha o tipo. Para elevador, o morador vê o telefone cadastrado pelo síndico.</p></span></div></div><div class="emergencyGrid"><article class="emergencyCard"><div>🚨</div><h3>Preso no elevador</h3><p>Mantenha a calma, acione o alarme interno e ligue para a operadora cadastrada.</p><strong>Elevadores Brasil · 0800 000 000</strong><div class="emergencyActions"><a class="button">☎ Ligar</a><button>⚠ Acionar</button></div></article><article class="emergencyCard"><div>🔥</div><h3>Incêndio ou fumaça</h3><p>Acione bombeiros e avise a portaria.</p><strong>Corpo de Bombeiros · 193</strong><div class="emergencyActions"><a class="button">☎ Ligar</a><button>⚠ Acionar</button></div></article><article class="emergencyCard"><div>🏥</div><h3>Emergência médica</h3><p>Informe unidade, bloco e ponto de referência.</p><strong>SAMU · 192</strong><div class="emergencyActions"><a class="button">☎ Ligar</a><button>⚠ Acionar</button></div></article></div></section>`}
function config(){return `<section class="panel"><div class="panelHead"><div><span>⚙</span><span><h2>Configurações</h2><p>Organizado por categorias para ficar simples.</p></span></div></div><div class="configTabs"><button class="on">🎨 Aparência</button><button>☰ Menu</button><button>🚨 Emergência</button><button>✉ Comunicação</button><button>🏢 Condomínio</button><button>📱 Apps</button></div><div class="settingsGrid"><section class="settingsCard"><h3>🌙 Tema</h3><div class="choice"><button class="selected">☀ Claro</button><button>🌙 Escuro</button></div></section><section class="settingsCard"><h3>🎨 Cor do sistema</h3><div class="palette"><button class="selected"><i style="background:#126b5f"></i>#126b5f</button><button><i style="background:#2563eb"></i>#2563eb</button><button><i style="background:#7c3aed"></i>#7c3aed</button><button><i style="background:#be123c"></i>#be123c</button></div></section></div><button class="saveConfig">💾 Salvar configurações</button></section>`}
function users(){return `<section class="panel"><div class="panelHead"><div><span>🔑</span><span><h2>Usuários e permissões</h2><p>Crie acessos delimitados para síndico, portaria e moradores.</p></span></div></div><form class="formGrid"><input value="João Portaria"><input value="portaria@condominio.com"><input value="senha temporária"><select><option>Portaria</option></select><button>Criar acesso</button></form><div class="accessBox"><section><h4>Moradores</h4><label><input type="checkbox" checked> Ver moradores</label><label><input type="checkbox"> Editar moradores</label></section><section><h4>Portaria</h4><label><input type="checkbox" checked> Encomendas</label><label><input type="checkbox" checked> Visitantes</label></section><section><h4>Administração</h4><label><input type="checkbox"> Configurações</label><label><input type="checkbox"> Usuários</label></section></div></section>`}
function apps(){return `<section class="panel"><div class="panelHead"><div><span>📱</span><span><h2>Apps para celular</h2><p>PWA instalável e projetos Android para gerar APKs.</p></span></div></div><div class="appCards"><article><h3>Portaria APK</h3><p>Abre direto em visitantes e encomendas.</p><code>/?app=portaria#/portaria</code></article><article><h3>Síndico APK</h3><p>Painel completo de administração.</p><code>/?app=sindico#/dashboard</code></article><article><h3>Morador APK</h3><p>Acesso reduzido ao morador.</p><code>/?app=morador#/morador</code></article></div></section>`}
function login(){return `<div class="loginPage"><button class="themeToggle">🌙 Escuro</button><section class="loginCard"><div class="brand"><div class="lotus">♧</div><h1>Vitória Régia</h1><span>CONDOMÍNIO PRO</span></div><p>Gestão premium para síndico, portaria e moradores.</p><form><label>✉ <input value="admin@vitoriaregia.local"></label><label>🔒 <input value="123456" type="password"></label><button class="primary">Entrar com segurança</button></form></section></div>`}
const screens={dashboard,packages,invoices,emergency,config,users,apps,login};
if(screen==='login'||screen==='login-dark'){document.getElementById('root').innerHTML=login(); if(screen==='login-dark')document.body.dataset.appearance='dark';}
else{document.getElementById('root').innerHTML=`<div class="app ${screen==='mobile'?'mobile-open':''}">${sidebar()}<main class="content"><header class="mobileHeader"><button class="iconBtn">☰</button><b>Vitória Régia</b><button class="iconBtn danger">🚨</button></header>${topbarDemo()}${(screens[screen]||dashboard)()}<footer><span>Condomínio Vitória Régia</span><b>Vitória Régia Pro v8.1</b></footer></main></div>`;}
</script></body></html>
