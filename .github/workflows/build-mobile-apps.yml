name: Gerar APKs Android Vitória Régia

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android-morador/**'
      - 'android-sindico/**'
      - 'android-portaria/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-mobile-apps.yml'

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g

jobs:
  build-apks:
    name: Compilar APKs por perfil
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Compilar APK Morador
        run: gradle :moradorApp:assembleDebug --no-daemon --stacktrace

      - name: Compilar APK Síndico
        run: gradle :sindicoApp:assembleDebug --no-daemon --stacktrace

      - name: Compilar APK Portaria
        run: gradle :portariaApp:assembleDebug --no-daemon --stacktrace

      - name: Organizar APKs
        run: |
          mkdir -p dist/android
          cp android-morador/app/build/outputs/apk/debug/app-debug.apk dist/android/vitoria-regia-morador-v3.8.0.apk
          cp android-sindico/app/build/outputs/apk/debug/app-debug.apk dist/android/vitoria-regia-sindico-v3.8.0.apk
          cp android-portaria/app/build/outputs/apk/debug/app-debug.apk dist/android/vitoria-regia-portaria-v3.8.0.apk
          ls -lh dist/android

      - name: Disponibilizar APKs como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vitoria-regia-apks-v3.8.0
          path: dist/android/*.apk

      - name: Publicar APKs em release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apps-v3.8.0
          name: Aplicativos Vitória Régia v3.8.0
          body: APKs gerados automaticamente para Morador, Síndico e Portaria.
          files: dist/android/*.apk
          make_latest: false
          prerelease: false
