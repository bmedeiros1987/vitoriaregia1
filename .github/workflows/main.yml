name: Build Portaria Kiosk APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-portaria-kiosk/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-portaria-kiosk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vitoria-regia-portaria-kiosk-debug-apk
          path: android-portaria-kiosk/app/build/outputs/apk/debug/app-debug.apk
