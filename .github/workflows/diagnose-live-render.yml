name: Diagnose live Render boot

on:
  push:
    branches:
      - diagnostic/live-render-boot
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Locate active Render service
        shell: bash
        run: |
          set -uo pipefail
          candidates=(
            'https://regia-pro.onrender.com'
            'https://vitoria-regia-pro.onrender.com'
            'https://vitoriaregia1.onrender.com'
            'https://vitoria-regia-one.onrender.com'
          )
          for base in "${candidates[@]}"; do
            echo
            echo "================ $base ================"
            curl -sS -L --max-time 45 -H 'Cache-Control: no-cache' -D /tmp/headers "$base/?diagnostic=$(date +%s)" -o /tmp/live || true
            cat /tmp/headers || true
            echo "body-size=$(wc -c </tmp/live 2>/dev/null || echo 0)"
            head -c 1200 /tmp/live 2>/dev/null || true
            echo
            echo '--- markers ---'
            grep -Eo '14\.0\.[0-9]+|20260719[a-z]|vr-boot-fallback|/assets/[^" ]+\.js|/src/main\.jsx' /tmp/live 2>/dev/null | head -40 || true
            echo '--- health ---'
            curl -sS -L --max-time 25 -o /tmp/health -w 'status=%{http_code} type=%{content_type} size=%{size_download}\n' "$base/api/health" || true
            head -c 500 /tmp/health 2>/dev/null || true
            echo
          done
