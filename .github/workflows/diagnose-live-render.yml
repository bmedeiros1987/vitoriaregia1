name: Diagnose live Render boot

on:
  push:
    branches:
      - diagnostic/live-render-boot
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Validate live login with headless Chrome
        shell: bash
        run: |
          set -uo pipefail
          base='https://vitoriaregia-pro.onrender.com'
          echo '=== HTML AND ASSETS ==='
          curl -sS -L --max-time 45 -H 'Cache-Control: no-cache' "$base/?diagnostic=$(date +%s)" -o /tmp/live.html
          grep -Eo '/assets/[^" ]+\.(js|css)' /tmp/live.html | sort -u | tee /tmp/assets.txt || true
          while read -r asset; do
            [ -z "$asset" ] && continue
            curl -sS -L --max-time 35 -o /tmp/asset -w "$asset status=%{http_code} type=%{content_type} size=%{size_download}\n" "$base$asset" || true
          done </tmp/assets.txt
          echo
          echo '=== HEADLESS DOM ==='
          browser=''
          for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
            if command -v "$candidate" >/dev/null 2>&1; then browser="$candidate"; break; fi
          done
          echo "browser=$browser"
          if [ -n "$browser" ]; then
            timeout 90 "$browser" --headless=new --no-sandbox --disable-gpu --disable-dev-shm-usage --virtual-time-budget=15000 --dump-dom "$base/?diagnostic=$(date +%s)" >/tmp/dom.html 2>/tmp/chrome.log || true
            echo "dom-size=$(wc -c </tmp/dom.html 2>/dev/null || echo 0)"
            grep -Ein 'login|entrar|email|senha|vr-boot-fallback|erro|error|root' /tmp/dom.html | head -100 || true
            echo '--- chrome log ---'
            tail -120 /tmp/chrome.log || true
          fi
          echo
          echo '=== API ==='
          curl -sS -L --max-time 35 -D /tmp/api.headers "$base/api/settings/public" -o /tmp/api.body || true
          cat /tmp/api.headers
          head -c 1200 /tmp/api.body
          echo
