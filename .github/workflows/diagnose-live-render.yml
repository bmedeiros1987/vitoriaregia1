name: Diagnose live Render boot

on:
  push:
    branches:
      - diagnostic/live-render-boot
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Capture live browser state
        shell: bash
        run: |
          python3 -m pip install --quiet websocket-client requests
          python3 .github/scripts/diagnose_live.py > live-diagnostic.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: live-render-diagnostic
          path: live-diagnostic.txt
          if-no-files-found: error
