name: Publicar voz gratuita

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar cliente do Hugging Face
        run: python -m pip install --upgrade huggingface_hub

      - name: Criar ou atualizar o Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, create_repo

          token = os.environ.get("HF_TOKEN", "").strip()
          repo_id = os.environ.get("HF_SPACE_ID", "").strip()
          if not token:
              raise SystemExit("Configure o secret HF_TOKEN no GitHub.")
          if not repo_id or "/" not in repo_id:
              raise SystemExit("Configure a variável HF_SPACE_ID como usuario/nome-do-space.")

          create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
              token=token,
          )
          HfApi(token=token).upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path="voice-service",
              commit_message="Atualiza Vitória Régia Voice",
          )
          print(f"Space publicado: {repo_id}")
          PY
