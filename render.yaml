services:
  - type: web
    name: vitoria-regia-pro
    env: node
    plan: starter
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: Vitória Régia Pro v10.2
      - key: DATABASE_SSL
        value: auto
      - key: DATABASE_SSL_MODE
        value: auto
      - key: NPM_CONFIG_AUDIT
        value: false
      - key: NPM_CONFIG_FUND
        value: false
      - key: NPM_CONFIG_UPDATE_NOTIFIER
        value: false
