services:
  - type: web
    name: crewcheck-premium
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node server.mjs
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        sync: false
      - key: MYSQL_SSL_MODE
        value: REQUIRED
      - key: CREWCHECK_AUTO_MIGRATE
        value: true
      - key: CREWCHECK_AUTH_REQUIRED
        value: true
      - key: MAILERSEND_API_KEY
        sync: false
      - key: MAILERSEND_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: CrewCheck
