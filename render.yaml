services:
  - type: web
    name: vitoriaregia1
    runtime: node
    rootDir: backend
    buildCommand: rm -f package-lock.json && npm cache clean --force && npm install --omit=dev --no-audit --no-fund --legacy-peer-deps --registry=https://registry.npmjs.org/
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://vitoriaregia1.onrender.com
      - key: DATABASE_PROVIDER
        value: mysql
      - key: REQUIRE_DATABASE
        value: "false"
      - key: AUTO_INIT_DB
        value: "true"
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_SSL
        value: "true"
      - key: MYSQL_SSL_MODE
        value: REQUIRED
      - key: MYSQL_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: bmedeiros1987@gmail.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_DISABLE_AFTER_FIRST_SINDICO
        value: "false"
      - key: ALLOW_LEGACY_DEMO_LOGIN
        value: "false"
      - key: REQUIRE_APPROVED_RESIDENT
        value: "true"
