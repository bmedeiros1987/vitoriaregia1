services:
  - type: web
    name: vitoria-regia-pro
    env: node
    plan: starter
    buildCommand: sh render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: Vitória Régia Pro v12.9.2
      - key: VITE_APP_VERSION
        value: Vitória Régia Pro v12.9.2
      - key: LANG
        value: C.UTF-8
      - key: LC_ALL
        value: C.UTF-8
      - key: PGCLIENTENCODING
        value: UTF8
      - key: TZ
        value: America/Sao_Paulo
      - key: NPM_CONFIG_REGISTRY
        value: https://registry.npmjs.org/
      - key: NPM_CONFIG_AUDIT
        value: false
      - key: NPM_CONFIG_FUND
        value: false
      - key: NPM_CONFIG_UPDATE_NOTIFIER
        value: false
      - key: DATABASE_SSL
        value: auto
      - key: DATABASE_SSL_MODE
        value: auto
      - key: VR_TELEGRAM_CONCIERGE_ENABLED
        value: true
      - key: VR_TELEGRAM_CONCIERGE_AUDIO_ENABLED
        value: true
      - key: VR_TELEGRAM_CONCIERGE_MAX_ITEMS
        value: 5
      - key: VR_TTS_RESPONSE_FORMAT
        value: opus
      - key: VR_TTS_VOICE
        value: pt-BR-FranciscaNeural
      - key: VR_STT_MODEL
        value: whisper-1
      - key: VR_TTS_BASE_URL
        sync: false
      - key: VR_TTS_API_KEY
        sync: false
      - key: VR_STT_BASE_URL
        sync: false
      - key: VR_STT_API_KEY
        sync: false
      - key: VR_TELEGRAM_CALL_ENABLED
        value: true
      - key: VR_CALLMEBOT_BASE_URL
        value: https://api.callmebot.com/start.php
      - key: VR_CALLMEBOT_LANG
        value: pt-BR-Standard-A
      - key: VR_CALLMEBOT_REPEAT
        value: 2
      - key: VR_CALLMEBOT_TEXT_COPY
        value: missed
      - key: VR_CALLMEBOT_TIMEOUT_SECONDS
        value: 45
      - key: VR_TELEGRAM_CALL_MAX_TTS_CHARS
        value: 256
      - key: VR_TELEGRAM_CALL_EMERGENCY_DELAY_SECONDS
        value: 2
      - key: VR_TELEGRAM_CALL_VISITOR_DELAY_SECONDS
        value: 20
      - key: VR_TELEGRAM_CALL_INTERCOM_DELAY_SECONDS
        value: 10
      - key: VR_TELEGRAM_CALL_URGENT_PACKAGE_DELAY_SECONDS
        value: 5
      - key: VR_TELEGRAM_CALL_USE_EDGE_TTS
        value: false
