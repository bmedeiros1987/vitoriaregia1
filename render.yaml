services:
  - type: web
    name: vitoriaregia1
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://vitoriaregia1.onrender.com
      - key: FRONTEND_DIR
        value: /opt/render/project/src
      - key: DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: PGSSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: REQUIRE_DATABASE
        value: "false"
      - key: AUTO_INIT_DB
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: bmedeiros1987@gmail.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_DISABLE_AFTER_FIRST_SINDICO
        value: "true"
      - key: ALLOW_LEGACY_DEMO_LOGIN
        value: "false"
      - key: REQUIRE_APPROVED_RESIDENT
        value: "true"
