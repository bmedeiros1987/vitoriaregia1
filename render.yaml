services:
  - type: web
    name: vitoria-regia-pro
    env: node
    plan: free
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NPM_CONFIG_AUDIT
        value: false
      - key: NPM_CONFIG_FUND
        value: false
      - key: NPM_CONFIG_UPDATE_NOTIFIER
        value: false
      - key: APP_VERSION
        value: Vitória Régia Pro v6.9
      - key: MAIL_PROVIDER
        value: sendgrid
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: Condomínio Vitória Régia
      - key: SENDGRID_REPLY_TO
        sync: false
      - key: SENDGRID_TO_DEFAULT
        sync: false
      - key: SENDGRID_DATA_RESIDENCY
        value: global
      - key: DATABASE_SSL
        value: auto
      - key: DATABASE_SSL_MODE
        value: auto
