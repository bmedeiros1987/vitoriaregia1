services:
  - type: web
    name: vitoria-regia-pro
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_VERSION
        value: Vitória Régia Pro v6.0
      - key: DATABASE_SSL
        value: true
