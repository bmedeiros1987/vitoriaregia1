services:
  - type: web
    name: vitoria-regia-pro
    env: node
    plan: starter
    buildCommand: sh render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: APP_VERSION
        value: Vitória Régia Pro v12.8.4
      - key: NPM_CONFIG_REGISTRY
        value: https://registry.npmjs.org/
      - key: NPM_CONFIG_AUDIT
        value: false
      - key: NPM_CONFIG_FUND
        value: false
      - key: NPM_CONFIG_UPDATE_NOTIFIER
        value: false
      - key: DATABASE_SSL
        value: auto
      - key: DATABASE_SSL_MODE
        value: auto
